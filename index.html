  <meta name="description"
    content="Домашняя Мастерская — система управления ремонтами электроники. Учёт заказов, склад запчастей, база знаний и AI-помощник." />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.tailwindcss.com https://esm.sh; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' https://esm.sh https://generativelanguage.googleapis.com https://openrouter.ai https://*.openrouter.ai; frame-src 'none'; object-src 'none'; base-uri 'self';" />

  <title>Домашняя Мастерская</title>
  <!-- Tailwind подключен через CDN для простоты, но React собирается через Vite -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            workshop: {
              50: '#f0f9ff',
              100: '#e0f2fe',
              500: '#0ea5e9',
              600: '#0284c7',
              800: '#075985',
              900: '#0c4a6e',
            }
          },
          keyframes: {
            'fade-in': {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            },
            'slide-up': {
              '0%': { transform: 'translateY(20px)', opacity: '0' },
              '100%': { transform: 'translateY(0)', opacity: '1' },
            },
            'slide-down': {
              '0%': { maxHeight: '0', opacity: '0' },
              '100%': { maxHeight: '1000px', opacity: '1' },
            },
            'fade-in-up': {
              '0%': { opacity: '0', transform: 'translateY(10px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' }
            }
          },
          animation: {
            'fade-in': 'fade-in 0.3s ease-out',
            'slide-up': 'slide-up 0.3s ease-out',
            'slide-down': 'slide-down 0.3s ease-out',
            'fade-in-up': 'fade-in-up 0.5s ease-out'
          },
          spacing: {
            'safe': 'env(safe-area-inset-bottom)'
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

    body {
      font-family: 'Inter', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    .pb-safe {
      padding-bottom: calc(80px + env(safe-area-inset-bottom));
    }

    .will-change-transform {
      will-change: transform;
    }

    /* Плавный переход dark mode */
    *,
    *::before,
    *::after {
      transition: background-color 0.2s ease, border-color 0.2s ease, color 0.15s ease;
    }

    /* Кастомный скроллбар */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }

    .dark ::-webkit-scrollbar-thumb {
      background: #475569;
    }

    .dark ::-webkit-scrollbar-thumb:hover {
      background: #64748b;
    }

    /* Выделение текста */
    ::selection {
      background: #3b82f6;
      color: white;
    }

    .dark ::selection {
      background: #60a5fa;
      color: #0f172a;
    }

    /* Градиент-текст */
    .text-gradient {
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* No scrollbar (для табов) */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    /* --- СТИЛИ ПЕЧАТИ --- */
    @media print {

      /* Скрываем всё по умолчанию */
      body * {
        visibility: hidden;
      }

      /* Делаем видимым только контейнер с документом и его содержимое */
      #printable-root,
      #printable-root * {
        visibility: visible;
      }

      /* Позиционируем документ поверх всего */
      #printable-root {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        min-height: 100vh;
        height: auto;
        margin: 0;
        padding: 0;
        z-index: 9999;
        background: white;
      }

      /* Убираем отступы страницы браузера */
      @page {
        margin: 0;
        size: auto;
      }

      /* Скрываем элементы интерфейса, если они случайно попали */
      .no-print {
        display: none !important;
      }
    }
  </style>

{
